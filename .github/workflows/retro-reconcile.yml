name: Retro reconcile

# Scheduled sweep (ticket 4KP67A, issue #791): flag open retro-filed issues whose
# safeword surface changed on the default branch after their newest recorded code
# state as `possibly-resolved`. Flag-only — the sweep never closes issues — and
# idempotent (marker comment + label), so re-runs are safe. Daily cadence with a
# per-run flag bound (30, actions/stale precedent) inside the CLI.
#
# Failure posture: one loud job. `safeword retro-reconcile` exits non-zero when
# GitHub access is missing, so a broken token shows up as a red scheduled run
# instead of a silent no-op. The public-repo 60-day scheduled-workflow auto-
# disable only bites inactive repos; workflow_dispatch is the manual fallback.

on:
  schedule:
    # Daily, off-peak minute (GitHub delays/drops high-load :00 crons).
    - cron: '17 6 * * *'
  workflow_dispatch:

# Never two overlapping sweeps (a slow run + the next cron tick would race the
# same issues; idempotency makes that harmless but noisy — one at a time).
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read # commits/tags queries (surfaceTouchedSince, resolveTagDate)
  issues: write # possibly-resolved label + marker comment

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run reconcile sweep
        # Runs the CLI from source (bun executes TS directly; no build needed).
        # GITHUB_TOKEN is ghs_-shaped, which resolveGitHubToken accepts as-is.
        run: bun packages/cli/src/cli.ts retro-reconcile
        env:
          GITHUB_TOKEN: ${{ github.token }}
