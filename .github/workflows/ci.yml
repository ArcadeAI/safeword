name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Sunday at midnight UTC - catches runner image and environmental drift
    - cron: '0 0 * * 0'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Config requires v2 format (see packages/cli/src/packs/golang/files.ts)
      - name: Install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.10.1

      - name: Install Python tools
        run: pip install -r .github/requirements-ci.txt

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run --cwd packages/cli build

      - name: Test CLI
        run: bun run --cwd packages/cli test

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI (required by eslint.config.mjs)
        run: bun run --cwd packages/cli build

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run --cwd packages/cli typecheck

      - name: Architecture check
        run: bun run deps

      - name: Version consistency check
        run: |
          CLI_VERSION=$(node -e "console.log(require('./packages/cli/package.json').version)")
          PLUGIN_VERSION=$(node -e "console.log(require('./plugin/.claude-plugin/plugin.json').version)")
          MARKETPLACE_VERSION=$(node -e "console.log(require('./marketplace.json').plugins[0].version)")
          if [ "$CLI_VERSION" != "$PLUGIN_VERSION" ] || [ "$CLI_VERSION" != "$MARKETPLACE_VERSION" ]; then
            echo "::error::Version mismatch: CLI=$CLI_VERSION Plugin=$PLUGIN_VERSION Marketplace=$MARKETPLACE_VERSION"
            exit 1
          fi
          echo "Versions consistent: $CLI_VERSION"
